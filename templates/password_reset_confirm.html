<script>
        async function submitNewPassword() {
            const pw1 = document.getElementById('pw1').value;
            const pw2 = document.getElementById('pw2').value;

            // Better URL parsing that handles trailing slashes safely
            const pathParts = window.location.pathname.replace(/\/$/, "").split('/');
            const token = pathParts[pathParts.length - 1]; 
            const uid = pathParts[pathParts.length - 2];

            console.log("Sending UID:", uid, "Token:", token);

            try {
                const response = await fetch('/api/v1/auth/password/reset/confirm/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: uid,
                        token: token,
                        new_password1: pw1,
                        new_password2: pw2
                    })
                });

                // Grab the actual JSON error from Django
                const data = await response.json();

                if(response.ok) {
                    alert("Success! Password has been changed in the database.");
                } else {
                    // Show exactly what Django didn't like!
                    alert("Django Error: \n" + JSON.stringify(data, null, 2));
                    console.error("Full error:", data);
                }
            } catch (error) {
                alert("Network error. Check the console.");
            }
        }
    </script>
