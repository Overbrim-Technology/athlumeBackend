<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; text-align: center; }
        input { display: block; margin: 10px auto; padding: 10px; width: 300px; }
        button { padding: 10px 20px; background: #007BFF; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Set New Password</h2>
    <p>This is a temporary backend test page.</p>

    <input type="password" id="pw1" placeholder="Enter New Password">
    <input type="password" id="pw2" placeholder="Confirm New Password">
    <button onclick="submitNewPassword()">Save Password</button>

    <script>
        function submitNewPassword() {
            // 1. Grab the passwords
            const pw1 = document.getElementById('pw1').value;
            const pw2 = document.getElementById('pw2').value;

            // 2. Extract the UID and Token from the URL you clicked
            const pathParts = window.location.pathname.split('/');
            // Path looks like: /password-reset/confirm/uid/token/
            const token = pathParts[pathParts.length - 2]; 
            const uid = pathParts[pathParts.length - 3];

            // 3. Send it to your Django API
            fetch('/api/v1/auth/password/reset/confirm/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    uid: uid,
                    token: token,
                    new_password1: pw1,
                    new_password2: pw2
                })
            })
            .then(response => {
                if(response.ok) {
                    alert("Success! Password has been changed in the database.");
                } else {
                    alert("Error: Link may be expired or passwords don't match.");
                }
            });
        }
    </script>
</body>
</html>
